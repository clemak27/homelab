---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
      interval: 50m
  interval: 30m
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
            kubernetes:
              namespace: services
              poll_timeout: 30m
            log:
              level: info
            plugins:
              k8s:
                address: "unix:///plugins/forgejo-runner-k8s.sock"
                options:
                  namespace: services
                  poll_timeout: 10m
                  labels: "app.kubernetes.io/name=forgejo-runner-instance"
                  resources: |
                    requests:
                      memory: 256Mi
                    limits:
                      memory: 256Mi
            runner:
              capacity: 4
              file: /persistent/.runner
              labels:
                - default:k8s:/config/podspec-default.yaml
                - large:k8s:/config/podspec-large.yaml
                - xl:k8s:/config/podspec-xl.yaml
                - buildah:k8s:/config/podspec-buildah.yaml
              timeout: 1h
          podspec-default.yaml: |-
            containers:
              - name: main
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                resources:
                  requests:
                    memory: 512Mi
                  limits:
                    memory: 512Mi
                    ephemeral-storage: 5Gi
            restartPolicy: Never
            nodeSelector:
              node-role.kubernetes.io/worker: worker
            tolerations:
              - effect: NoSchedule
                key: node-type
                operator: Equal
                value: agent
          podspec-large.yaml: |-
            containers:
              - name: main
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                resources:
                  requests:
                    memory: 2Gi
                  limits:
                    memory: 2Gi
                    ephemeral-storage: 5Gi
            restartPolicy: Never
            nodeSelector:
              node-role.kubernetes.io/worker: worker
            tolerations:
              - effect: NoSchedule
                key: node-type
                operator: Equal
                value: agent
          podspec-xl.yaml: |-
            containers:
              - name: main
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04
                env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                resources:
                  requests:
                    memory: 4Gi
                  limits:
                    memory: 4Gi
                    ephemeral-storage: 5Gi
            restartPolicy: Never
            nodeSelector:
              node-role.kubernetes.io/worker: worker
            tolerations:
              - effect: NoSchedule
                key: node-type
                operator: Equal
                value: agent
          podspec-buildah.yaml: |-
            hostUsers: false
            containers:
              - name: main
                image: docker.io/ppaslan/forgejo-buildah:v1.43.1-2
                env:
                  - name: BUILDAH_ISOLATION
                    value: chroot
                  - name: STORAGE_DRIVER
                    value: overlay
                  - name: TAR_OPTIONS
                    value: "--no-same-permissions --no-same-owner"
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
                  allowPrivilegeEscalation: false
                  # readOnlyRootFilesystem: true
                  capabilities:
                    add:
                      - SETUID
                      - SETGID
                      - SYS_CHROOT
                      - SETFCAP
                      - CHOWN
                    drop:
                      - ALL
                  seccompProfile:
                    type: Localhost
                    localhostProfile: profiles/ci-build.json
                volumeMounts:
                  - name: buildah-storage
                    mountPath: /var/lib/containers/storage
                  - name: tmp
                    mountPath: /tmp
                  - name: var-tmp
                    mountPath: /var/tmp
                  - name: run
                    mountPath: /run
                resources:
                  requests:
                    memory: 4Gi
                  limits:
                    memory: 4Gi
                    ephemeral-storage: 10Gi
            restartPolicy: Never
            tolerations:
              - effect: NoSchedule
                key: node-type
                operator: Equal
                value: agent
            volumes:
              - name: buildah-storage
                emptyDir:
                  sizeLimit: 10Gi
              - name: tmp
                emptyDir:
                  sizeLimit: 1Gi
              - name: var-tmp
                emptyDir:
                  sizeLimit: 1Gi
              - name: run
                emptyDir:
                  sizeLimit: 256Mi
    controllers:
      forgejo-runner:
        type: statefulset
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - name: persistent
              size: 1Gi
              accessMode: ReadWriteMany
              globalMounts:
                - path: /persistent
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          tolerations:
            - effect: NoSchedule
              key: node-type
              operator: Equal
              value: agent
        initContainers:
          k8s-plugin:
            image:
              repository: registry.erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: 12.10.9
            args:
              - --listen
              - unix:///plugins/forgejo-runner-k8s.sock
            restartPolicy: Always
            resources:
              requests:
                memory: 64Mi
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          register-runner:
            image:
              repository: registry.erwanleboucher.dev/eleboucher/runner
              tag: 12.13.0
            command:
              - sh
              - -c
              - |
                if [ -f /persistent/.runner ]; then
                  echo "Runner already registered, skipping"
                  exit 0
                fi
                echo "Registering runner..."
                cd /persistent && forgejo-runner register \
                  --instance http://forgejo-http:3000 \
                  --token "${RUNNER_TOKEN}" \
                  --name k8s-runner \
                  --labels "default:k8spod:/config/podspec-default.yaml" \
                  --no-interactive
            env:
              - name: RUNNER_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: forgejo-runner-secret
                    key: key

        containers:
          runner:
            image:
              repository: registry.erwanleboucher.dev/eleboucher/runner
              tag: 12.13.0
            command:
              - /bin/forgejo-runner
              - daemon
              - --config
              - /config/runner.yaml
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    serviceAccount:
      forgejo-runner: {}
    rbac:
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - "batch"
              resources:
                - jobs
              verbs:
                - create
                - get
                - list
                - watch
                - delete
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - get
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      plugins:
        type: emptyDir
        globalMounts:
          - path: /plugins
      tmpfs:
        type: emptyDir
        sizeLimit: 5Gi
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp

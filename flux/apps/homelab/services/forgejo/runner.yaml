---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
      interval: 50m
  interval: 30m
  values:
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: false
            container:
              docker_host: "-"
            kubernetes:
              namespace: services
              poll_timeout: 30m
            log:
              level: info
            pluginsv2:
              k8s:
                path: /plugins/forgejo-runner-k8s
                options:
                  namespace: services
                  poll_timeout: 30m
            runner:
              capacity: 1
              file: /persistent/.runner
              labels:
                - default:k8s:/config/podspec-default.yaml
                - large:k8s:/config/podspec-large.yaml
                - buildah:k8s:/config/podspec-buildah.yaml
              timeout: 1h
          podspec-default.yaml: |-
            containers:
              - name: main
                image: node:22-bookworm
                resources:
                  requests:
                    cpu: "500m"
                    memory: 512Mi
                  limits:
                    memory: 512Mi
                    ephemeral-storage: 5Gi
            restartPolicy: Never
          podspec-large.yaml: |-
            containers:
              - name: main
                image: node:22-bookworm
                resources:
                  requests:
                    cpu: "500m"
                    memory: 2Gi
                  limits:
                    memory: 2Gi
                    ephemeral-storage: 5Gi
            restartPolicy: Never
          podspec-buildah.yaml: |-
            hostUsers: false
            containers:
              - name: main
                image: docker.io/ppaslan/forgejo-buildah:v1.43.1-2
                env:
                  - name: BUILDAH_ISOLATION
                    value: chroot
                  - name: STORAGE_DRIVER
                    value: overlay
                  - name: TAR_OPTIONS
                    value: "--no-same-permissions --no-same-owner"
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
                  allowPrivilegeEscalation: false
                  # readOnlyRootFilesystem: true
                  capabilities:
                    add:
                      - SETUID
                      - SETGID
                      - SYS_CHROOT
                      - SETFCAP
                      - CHOWN
                    drop:
                      - ALL
                  seccompProfile:
                    type: Localhost
                    localhostProfile: profiles/ci-build.json
                volumeMounts:
                  - name: buildah-storage
                    mountPath: /var/lib/containers/storage
                  - name: tmp
                    mountPath: /tmp
                  - name: var-tmp
                    mountPath: /var/tmp
                  - name: run
                    mountPath: /run
                resources:
                  requests:
                    cpu: "500m"
                    memory: 2Gi
                  limits:
                    memory: 2Gi
                    ephemeral-storage: 10Gi
            volumes:
              - name: buildah-storage
                emptyDir:
                  sizeLimit: 10Gi
              - name: tmp
                emptyDir:
                  sizeLimit: 1Gi
              - name: var-tmp
                emptyDir:
                  sizeLimit: 1Gi
              - name: run
                emptyDir:
                  sizeLimit: 256Mi
            restartPolicy: Never
    controllers:
      forgejo-runner:
        type: statefulset
        replicas: 1
        statefulset:
          volumeClaimTemplates:
            - name: persistent
              size: 1Gi
              accessMode: ReadWriteMany
              globalMounts:
                - path: /persistent
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        initContainers:
          copy-k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin-v2
              tag: sha-f7ab06b75887e5497c9f9f9bef641aafb2ae3e1c
            command:
              - sh
              - -c
              - cp /usr/local/bin/forgejo-runner-k8s /plugins/forgejo-runner-k8s
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          register-runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: sha-a954a95458892f9a9a03739d52610e26be4b25fd
            command:
              - sh
              - -c
              - |
                if [ -f /persistent/.runner ]; then
                  echo "Runner already registered, skipping"
                  exit 0
                fi
                echo "Registering runner..."
                cd /persistent && forgejo-runner register \
                  --instance http://forgejo-http:3000 \
                  --token "${RUNNER_TOKEN}" \
                  --name k8s-runner \
                  --labels "default:k8spod:/config/podspec-default.yaml" \
                  --no-interactive
            env:
              - name: RUNNER_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: forgejo-runner-secret
                    key: key

        containers:
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: sha-a954a95458892f9a9a03739d52610e26be4b25fd
            command:
              - /bin/forgejo-runner
              - daemon
              - --config
              - /config/runner.yaml
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    serviceAccount:
      forgejo-runner: {}
    rbac:
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - "pods"
              verbs:
                - "list"
                - "watch"
                - "create"
                - "get"
                - "delete"
            - apiGroups:
                - ""
              resources:
                - "pods/exec"
              verbs:
                - "create"
                - "get"
            - apiGroups:
                - ""
              resources:
                - "pods/log"
              verbs:
                - "list"
                - "watch"
                - "get"
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      plugins:
        type: emptyDir
        globalMounts:
          - path: /plugins
      tmpfs:
        type: emptyDir
        sizeLimit: 5Gi
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp

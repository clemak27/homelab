---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: services
resources:
  - database.yaml
  - forgejo-admin.yaml
  - forgejo-runner-secret.yaml
  - release.yaml
  - runner.yaml
configMapGenerator:
  - name: forgejo-values
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml

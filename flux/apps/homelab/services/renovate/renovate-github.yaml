---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-github
spec:
  schedule: '@hourly'
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - image: renovate/renovate:43.136.2
              name: renovate
              env:
                - name: RENOVATE_PLATFORM
                  value: 'github'
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-token
                      key: github
                - name: RENOVATE_AUTODISCOVER
                  value: 'true'
                - name: RENOVATE_AUTODISCOVER_FILTER
                  value: "clemak27/*"
                - name: RENOVATE_BASE_DIR
                  value: '/tmp/renovate/'
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_REQUIRE_CONFIG
                  value: 'required'
                - name: RENOVATE_ONBOARDING
                  value: 'false'
                - name: RENOVATE_GIT_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: renovate-signing
                      key: key
                - name: RENOVATE_GIT_PRIVATE_KEY_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: renovate-signing
                      key: password
              volumeMounts:
                - name: data-volume
                  mountPath: /tmp/renovate/
          restartPolicy: Never
          volumes:
            - name: data-volume
              emptyDir: {}

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/values.schema.json
controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/atuinsh/atuin
          tag: v18.15.2
        env:
          TZ: Europe/Vienna
          ATUIN_HOST: "0.0.0.0"
          ATUIN_PORT: 8888
          ATUIN_OPEN_REGISTRATION: true
          ATUIN_DB_URI: "sqlite:///app/data/atuin.db"

defaultPodOptions:
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

service:
  main:
    type: ClusterIP
    controller: main
    ports:
      http:
        port: 8888

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: letsencrypt-production
    hosts:
      - host: atuin.wallstreet30.cc
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - hosts:
          - atuin.wallstreet30.cc
        secretName: mealie-tls

persistence:
  config:
    enabled: true
    size: 5Gi
    accessMode: "ReadWriteOnce"
    type: persistentVolumeClaim
    globalMounts:
      - path: /app/data
        readOnly: false

---
name: test

on:
  - pull_request

jobs:
  flux-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Install tools
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204  # v4.2.2
      - name: Run flux-local test
        shell: bash
        run: flux-local test --enable-helm -v

  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Clean up space
        uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7  # v10
      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342  # v31.11.0
      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d  # v14
      - name: Run check
        run: nix flake check -L --no-build

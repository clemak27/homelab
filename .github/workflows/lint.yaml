---
name: lint

on:
  - pull_request

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Install tools
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204  # v4.2.2
      - name: Run actionlint
        run: actionlint -shellcheck=

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Install tools
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204  # v4.2.2
      - name: Run yamllint
        run: yamllint .
